name: nostr_mail
description: A Dart SDK for sending and receiving emails over the Nostr protocol using NIP-59 gift-wrapped messages.
version: 2.0.1
repository: https://github.com/nogringo/nostr-mail-dart
homepage: https://github.com/nogringo/nostr-mail-dart
issue_tracker: https://github.com/nogringo/nostr-mail-dart/issues

topics:
  - nostr
  - email
  - encryption
  - messaging
  - decentralized

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.10.8

dependencies:
  ndk: ^0.8.4-dev.1
  enough_mail_plus: ^2.2.4
  sembast: ^3.8.6
  http: ^1.6.0
  html: ^0.15.6
  cryptography: ^2.9.0
  rxdart: ^0.28.0
  broadcast_queue_shim_for_ndk: ^0.2.0
  blossom_upload_queue_shim_for_ndk: ^0.4.0
  blossom_cache: ^0.3.0

dev_dependencies:
  bip340: ^0.3.1
  idb_shim: ^2.9.2
  lints: ^6.1.0
  mocktail: ^1.0.4
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  test: ^1.31.0
  crypto: ^3.0.7
